version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  python-ml-service:
    build:
      context: ./python-ml-service
      dockerfile: Dockerfile
    container_name: python-ml-service
    ports:
      - "8000:8000"
    volumes:
      - ./python-ml-service:/app
    environment:
      - PORT=8000
    restart: unless-stopped

  node-backend:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: node-backend
    ports:
      - "5000:5000"
    volumes:
      - ./node-backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/farmers_friend
      - ML_SERVICE_URL=http://python-ml-service:8000
      - JWT_SECRET=development_secret_key_change_me
    depends_on:
      - mongodb
      - python-ml-service
    restart: unless-stopped

volumes:
  mongodb_data:
